apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app: app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      # REQUIRED: tolerate the spot taint AKS applies to spot nodes.
      tolerations:
        - key: "kubernetes.azure.com/scalesetpriority"
          operator: "Equal"
          value: "spot"
          effect: "NoSchedule"
      affinity:
        nodeAffinity:
          # REQUIRED: only run on NAP/Karpenter nodes (excludes the fixed agentpool).
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: karpenter.sh/capacity-type
                    operator: In
                    values: ["spot", "on-demand"]
          # PREFERRED: among NAP nodes, prefer spot.
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: karpenter.sh/capacity-type
                    operator: In
                    values: ["spot"]
      containers:
        - name: app
          image: mafamafa/phpinfo-ubuntu:202401182132
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 80
      terminationGracePeriodSeconds: 25
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: app-pdb
spec:
  # At least half the pods stay up during voluntary disruptions
  # (consolidation, daily on-demand expiry, drains). Evicts one at a time at 3 replicas.
  minAvailable: 50%
  selector:
    matchLabels:
      app: app
